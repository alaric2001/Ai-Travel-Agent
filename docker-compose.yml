version: '3.8'

# =============================================================
# AI Travel Agent — Docker Compose
# Struktur: backend di root, frontend di ./client
# =============================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: travel-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-travel_agent_db}
      POSTGRES_USER:     ${DB_USER:-travel_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_dev_only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./database/seeds:/docker-entrypoint-initdb.d/seeds:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-travel_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travel-agent-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .           # Root = backend
      dockerfile: docker/Dockerfile.api
    container_name: travel-agent-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:             development
      PORT:                 3001
      DATABASE_URL:         postgresql://${DB_USER:-travel_admin}:${DB_PASSWORD:-changeme_dev_only}@postgres:5432/${DB_NAME:-travel_agent_db}
      REDIS_URL:            redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379
      GEMINI_API_KEY:       ${GEMINI_API_KEY}
      GOOGLE_MAPS_API_KEY:  ${GOOGLE_MAPS_API_KEY}
      JWT_SECRET:           ${JWT_SECRET:-jwt_dev_secret}
      CORS_ORIGIN:          http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: ./client    # Frontend = ./client
      dockerfile: ../docker/Dockerfile.web
    container_name: travel-agent-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL:             http://localhost:3001
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
